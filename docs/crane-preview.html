<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Flock Preview — Sedge of Cranes</title>
  <!--
    crane-preview.html — Phase 6 lab page (not linked from the main app).

    WHY THIS PAGE EXISTS: iterating on how the cranes LOOK is much faster
    when you don't have to point a phone at a mat every time. This page
    renders the exact same flock component the AR scene uses, in a plain
    3D scene. If it looks right and runs at ≥ 24 fps here, it will look
    right in AR (AR adds the camera feed + tracking cost, which is why we
    still verify on the mat afterwards).

    Controls: drag to look around · buttons trigger the three story beats
    and freeze/resume · the HUD shows FPS, draw calls and triangles.
  -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- baked authentic-tsuru geometry; must load BEFORE flock.js so the
       geom:'fold' path can find window.CRANE_FOLD -->
  <script src="js/crane_fold_geometry.js?v=0.7.0"></script>
  <script src="js/flock.js?v=0.7.0"></script>
  <!-- walking origami cardinal (preview-only character). Geometry module must
       load before cardinal.js so the component finds window.CARDINAL_FOLD. -->
  <script src="js/cardinal_fold_geometry.js?v=0.2.0"></script>
  <script src="js/cardinal.js?v=0.2.0"></script>
  <style>
    :root {
      --paper: #fdf9f0;
      --ink: #3a3128;
      --red: #b33a2e;
      --sky-edge: #cfe3ee;
    }
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    a-scene { position: fixed; inset: 0; }

    /* header: a little paper tag, like a label tied to a gift */
    .tag {
      position: fixed; top: 10px; left: 10px; z-index: 10;
      background: var(--paper); color: var(--ink);
      border: 1.5px solid var(--ink); border-radius: 4px 14px 14px 14px;
      padding: 8px 14px; box-shadow: 2px 3px 0 rgba(58,49,40,.18);
      max-width: 70vw;
    }
    .tag h1 { margin: 0; font-size: 15px; letter-spacing: .02em; }
    .tag h1 span { color: var(--red); }
    .tag small { color: #7a6f61; font-size: 11px; }

    /* HUD: performance numbers, top-right */
    #hud {
      position: fixed; top: 10px; right: 10px; z-index: 10;
      background: rgba(58,49,40,.82); color: #fdf9f0;
      font: 12px/1.5 ui-monospace, Menlo, monospace;
      padding: 8px 10px; border-radius: 10px; white-space: pre;
    }
    #hud .bad { color: #ffb3a7; }

    /* beat buttons: paper chips along the bottom, thumb-reachable */
    #controls {
      position: fixed; bottom: max(14px, env(safe-area-inset-bottom)); left: 0; right: 0;
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
      z-index: 10; padding: 0 10px;
    }
    #controls button {
      font: 600 14px/1 system-ui, sans-serif; color: var(--ink);
      background: var(--paper); border: 1.5px solid var(--ink);
      border-radius: 12px; padding: 12px 16px; min-width: 84px;
      box-shadow: 2px 3px 0 rgba(58,49,40,.18); cursor: pointer;
      touch-action: manipulation;
    }
    #controls button:active { transform: translate(1px, 2px); box-shadow: 0 1px 0 rgba(58,49,40,.18); }
    #controls button.primary { background: var(--red); color: var(--paper); border-color: var(--red); }
    @media (prefers-reduced-motion: reduce) { #controls button:active { transform: none; } }
  </style>
</head>
<body>
  <div class="tag">
    <h1>Flock preview · <span>Sedge of Cranes</span></h1>
    <small id="stamp">Phase 6 · drag to look around</small>
    <br><small>geometry:
      <a href="?geom=proc">procedural</a> ·
      <a href="?geom=fold">authentic fold</a> ·
      <a href="?geom=cardinal">🐦 cardinal</a></small>
  </div>

  <div id="hud">loading…</div>

  <div id="controls">
    <button id="btn-freeze" class="primary">⏸ Freeze</button>
    <button data-beat="wobble">Beat 1 · wobble</button>
    <button data-beat="loop">Beat 2 · loop</button>
    <button data-beat="finale">Beat 3 · circle</button>
    <button id="btn-peck" hidden>🐦 Peck</button>
  </div>

  <a-scene
    background="color: #dfeefa"
    renderer="antialias: true; colorManagement: true; toneMapping: ACESFilmic; exposure: 1.15"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- same lighting recipe as the AR scene: ambient + one directional -->
    <!-- same rig as the AR scene — see index.html for the full rationale -->
    <a-entity light="type: hemisphere; color: #dceaf6; groundColor: #e8dcc6; intensity: 0.35"></a-entity>
    <a-entity light="type: directional; color: #fff4e2; intensity: 1.15"
              position="0.6 1.2 0.5"></a-entity>
    <a-entity light="type: directional; color: #ffdcb4; intensity: 0.35"
              position="-0.5 -0.3 -0.8"></a-entity>

    <!-- a warm "table" disc so the blob shadows have something to land on -->
    <a-circle position="0 0 0" rotation="-90 0 0" radius="0.5"
              material="color: #efe4d0; shader: flat"></a-circle>
    <!-- stand-in for the child's real crane at the anchor point -->
    <a-box position="0 0.012 0" depth="0.06" width="0.04" height="0.024"
           material="color: #ffffff; shader: flat"></a-box>

    <!-- THE FLOCK — identical component + defaults as the AR scene.
         Created from script so ?geom=fold|proc can pick the geometry source
         BEFORE the component initialises (it reads geom only at init). -->
    <script>
      (function () {
        var m = /[?&]geom=(fold|proc|cardinal)/.exec(location.search);
        var geom = m ? m[1] : 'proc';
        var e = document.createElement('a-entity');
        e.id = 'flock';   // keep the id so the Freeze button + HUD wiring works
        if (geom === 'cardinal') {
          e.setAttribute('walking-cardinal', 'autoShow: true');
        } else {
          e.setAttribute('sedge-flock',
            'autoShow: true; autoTarget: false; geom: ' + geom);
        }
        document.currentScript.parentNode.appendChild(e);
        window.__geom = geom;
      })();
    </script>

    <!-- Camera rig. Two traps solved here:
         (1) <a-camera> has a HIDDEN default position of y=1.6 m ("standing
             person eye height") — we must set position="0 0 0" explicitly
             or the camera floats far above our miniature scene and frustum
             culling draws nothing (draw calls = 0).
         (2) look-controls ignores an initial rotation on the camera entity,
             so the downward tilt lives on the rig instead. -->
    <a-entity id="rig" position="0 0.30 0.55" rotation="-20 0 0">
      <a-camera position="0 0 0"
                look-controls="magicWindowTrackingEnabled: false"
                wasd-controls-enabled="false" fov="55"></a-camera>
    </a-entity>
  </a-scene>

  <script>
    (function () {
      'use strict';
      var geom = window.__geom || 'proc';
      var ver = geom === 'cardinal'
        ? (window.CARDINAL_VERSION || '?')
        : (window.SEDGE_FLOCK_VERSION || '?');
      document.getElementById('stamp').textContent =
        'v' + ver + ' · ' +
        (geom === 'cardinal' ? 'cardinal · walking' : 'geom: ' + geom) +
        ' · drag to look around';

      var flock = document.getElementById('flock');

      // Cardinal mode: the three crane story-beats don't apply — hide them and
      // offer a Peck button instead. Freeze still works (the cardinal listens
      // to the same flock-freeze/flock-resume events).
      if (geom === 'cardinal') {
        document.querySelectorAll('[data-beat]').forEach(function (b) { b.hidden = true; });
        var peck = document.getElementById('btn-peck');
        peck.hidden = false;
        peck.addEventListener('click', function () { flock.emit('cardinal-peck'); });
      }

      // beat buttons
      document.querySelectorAll('[data-beat]').forEach(function (b) {
        b.addEventListener('click', function () {
          flock.emit('flock-beat', { name: b.dataset.beat });
        });
      });

      // freeze / resume toggle (same events the AR app fires on target lost/found)
      var frozen = false;
      var fbtn = document.getElementById('btn-freeze');
      fbtn.addEventListener('click', function () {
        frozen = !frozen;
        flock.emit(frozen ? 'flock-freeze' : 'flock-resume');
        fbtn.textContent = frozen ? '▶ Resume' : '⏸ Freeze';
      });

      // HUD: FPS from requestAnimationFrame, draw calls + triangles from three
      var hud = document.getElementById('hud');
      var frames = 0, last = performance.now();
      function raf() { frames++; requestAnimationFrame(raf); }
      requestAnimationFrame(raf);
      setInterval(function () {
        var now = performance.now();
        var fps = Math.round(frames * 1000 / (now - last));
        frames = 0; last = now;
        var scene = document.querySelector('a-scene');
        var info = scene && scene.renderer ? scene.renderer.info.render : null;
        var cls = fps < 24 ? ' class="bad"' : '';
        hud.innerHTML =
          '<span' + cls + '>fps        ' + fps + '</span>\n' +
          'draw calls ' + (info ? info.calls : '–') + '\n' +
          'triangles  ' + (info ? info.triangles : '–');
      }, 500);
    })();
  </script>
</body>
</html>
