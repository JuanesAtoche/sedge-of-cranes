<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sedge of Cranes</title>
  <link rel="stylesheet" href="css/style.css?v=0.7.0" />
  <!--
    NOTE (Phase 4): the AR libraries (A-Frame 1.5.0 + MindAR 1.2.5, ~1.5 MB)
    are now LAZY-LOADED by js/app.js when the user taps Start. The landing
    page itself is ~50 KB, which keeps cold start fast on 4G (spec §8).
    Pinned CDN URLs live at the top of js/app.js.
  -->
</head>
<body>

  <!-- ============ STATE 1: landing ============ -->
  <section id="state-landing">
    <svg class="crane-emblem" viewBox="0 0 120 100" role="img" aria-label="Origami crane">
      <polygon points="10,62 48,50 44,78" fill="#d9534a"/>
      <polygon points="44,78 48,50 78,58 62,84" fill="#b8433c"/>
      <polygon points="48,50 58,12 78,58" fill="#e8776f"/>
      <polygon points="78,58 96,44 104,30 98,44" fill="#d9534a"/>
      <polygon points="104,30 112,26 104,36" fill="#24435c"/>
    </svg>
    <h1 data-str="appTitle"></h1>
    <p data-str="tagline"></p>
    <p class="warn" id="inapp-warning" hidden data-str="inAppWarning"></p>
    <button id="btn-start" data-str="startButton"></button>
    <p class="explainer" data-str="cameraExplainer"></p>
    <p><a href="assets/mat.pdf" target="_blank" data-str="matLinkLabel"></a></p>
    <p class="version" id="version-stamp"></p>
  </section>

  <!-- ============ STATE 2: permission denied ============ -->
  <section id="state-denied" hidden>
    <h1 data-str="deniedTitle"></h1>
    <p id="denied-body"></p>
    <button id="btn-retry" data-str="retryButton"></button>
  </section>

  <!-- ============ STATE 5: unsupported / load error (with GIF fallback) ============ -->
  <section id="state-unsupported" hidden>
    <h1 id="unsupported-title"></h1>
    <p id="unsupported-body"></p>
    <p class="explainer" data-str="fallbackCaption"></p>
    <img class="fallback-gif" src="assets/fallback.gif" alt="Animation of seven paper cranes flying over the story mat" loading="lazy" />
  </section>

  <!-- ============ STATES 3 & 4: AR (scanning ⇄ experience) ============ -->
  <div id="ar-container" hidden>
    <!-- The <a-scene> lives in a template: it must not exist in the DOM
         until A-Frame + MindAR are loaded (lazy). app.js injects it. -->
    <template id="ar-scene-template">
      <a-scene id="ar-scene"
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 2; missTolerance: 30"
        color-space="sRGB"
        renderer="colorManagement: true; antialias: true; toneMapping: ACESFilmic; exposure: 1.15"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <!-- ===================== LIGHT RIG (v0.6.0) =====================
             The 0.5.x rig was ambient 0.9 + directional 0.7 — MORE ambient
             than key light. Ambient has no direction, so most of every
             facet's brightness carried no shape information and the cranes
             read as flat printed shapes. A real paper crane shows ~6 tones
             from ONE flat colour; that only happens at a key:fill ratio
             around 4:1.

             Most of the "fill" now comes from the procedural environment map
             built in flock.js (sky above, warm table bounce below), which is
             also what gives the paper its sheen. The hemisphere light below
             is deliberate insurance: MeshLambertMaterial ignores environment
             maps, so without it the pbr:false kill switch would render the
             flock nearly black.

             Tune exposure on the <a-scene renderer> above, not these. -->
        <a-entity light="type: hemisphere; color: #dceaf6; groundColor: #e8dcc6; intensity: 0.35"></a-entity>
        <a-entity light="type: directional; color: #fff4e2; intensity: 1.15" position="0.6 1.2 0.5"></a-entity>
        <!-- rim/back light: paper is translucent, and light bleeding through
             a sheet is a big part of why real cranes glow. This fakes it. -->
        <a-entity light="type: directional; color: #ffdcb4; intensity: 0.35" position="-0.5 -0.3 -0.8"></a-entity>
        <a-entity id="mat-anchor" mindar-image-target="targetIndex: 0">
          <!-- v0.7.0: kids approved the authentic tsuru (Phase 6 "wow" test),
               so the mat scene now uses geom:fold. Image tracking is unchanged.
               To revert instantly, set this back to just `sedge-flock`. -->
          <a-entity id="flock" sedge-flock="geom: fold"></a-entity>          
        </a-entity>
      </a-scene>
    </template>

    <div id="overlay-scanning" class="overlay-card">
      <img src="assets/mat_thumb.png" alt="" />
      <p id="scanning-text"></p>
    </div>

    <button id="btn-story" class="story-btn" hidden></button>
    <div id="subtitle-bar" hidden></div>

    <button id="btn-exit" data-str="exitButton" aria-label="Exit"></button>
    <button id="btn-mute" class="chip"></button>
    <button id="btn-subs" class="chip"></button>
  </div>

  <script src="js/strings.js?v=0.7.0"></script>
  <script src="js/app.js?v=0.7.0"></script>
</body>
</html>
