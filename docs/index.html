<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Title is set from strings.js at load time -->
  <title>Sedge of Cranes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============ STATE: landing ============ -->
  <section id="state-landing">
    <!-- Inline SVG so no extra network request. A stylized folded crane
         made of triangles, matching the paper-craft theme. -->
    <svg class="crane-emblem" viewBox="0 0 120 100" role="img" aria-label="Origami crane">
      <polygon points="10,62 48,50 44,78" fill="#d9534a"/>          <!-- tail -->
      <polygon points="44,78 48,50 78,58 62,84" fill="#b8433c"/>    <!-- body -->
      <polygon points="48,50 58,12 78,58" fill="#e8776f"/>          <!-- raised wing -->
      <polygon points="78,58 96,44 104,30 98,44" fill="#d9534a"/>   <!-- neck -->
      <polygon points="104,30 112,26 104,36" fill="#24435c"/>       <!-- head -->
    </svg>

    <h1 data-str="appTitle"></h1>
    <p data-str="tagline"></p>
    <button id="btn-start" data-str="startButton"></button>
    <p class="explainer" data-str="cameraExplainer"></p>
    <!-- Mat PDF link goes live in Phase 1 when the mat exists -->
  </section>

  <!-- ============ STATE: camera-test (Phase 0 only) ============ -->
  <section id="state-camera-test" hidden>
    <h1 data-str="cameraTestTitle"></h1>
    <video id="camera-preview" autoplay playsinline muted></video>
    <div><span class="ok-badge" data-str="cameraTestOk"></span></div>
    <button id="btn-stop" data-str="cameraTestStop"></button>
  </section>

  <!-- ============ STATE: denied ============ -->
  <section id="state-denied" hidden>
    <h1 data-str="deniedTitle"></h1>
    <p data-str="deniedBody"></p>
    <button id="btn-retry" data-str="retryButton"></button>
  </section>

  <!-- ============ STATE: unsupported ============ -->
  <section id="state-unsupported" hidden>
    <h1 data-str="unsupportedTitle"></h1>
    <p data-str="unsupportedBody"></p>
  </section>

  <script src="js/strings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
