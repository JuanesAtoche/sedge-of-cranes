<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sedge of Cranes</title>
  <link rel="stylesheet" href="css/style.css" />
  <!--
    AR libraries, pinned versions (verified on npm):
    - A-Frame 1.5.0  (pinned to 1.5.x: the newest version MindAR 1.2.5 is documented against)
    - MindAR  1.2.5  (latest)
    Lazy-loading these after the landing screen is a Phase 4 task.
  -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe-v1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <!-- ============ STATE: landing ============ -->
  <section id="state-landing">
    <svg class="crane-emblem" viewBox="0 0 120 100" role="img" aria-label="Origami crane">
      <polygon points="10,62 48,50 44,78" fill="#d9534a"/>
      <polygon points="44,78 48,50 78,58 62,84" fill="#b8433c"/>
      <polygon points="48,50 58,12 78,58" fill="#e8776f"/>
      <polygon points="78,58 96,44 104,30 98,44" fill="#d9534a"/>
      <polygon points="104,30 112,26 104,36" fill="#24435c"/>
    </svg>
    <h1 data-str="appTitle"></h1>
    <p data-str="tagline"></p>
    <button id="btn-start" data-str="startButton"></button>
    <p class="explainer" data-str="cameraExplainer"></p>
    <p><a href="assets/mat.pdf" target="_blank" data-str="matLinkLabel"></a></p>
  </section>

  <!-- ============ STATE: denied ============ -->
  <section id="state-denied" hidden>
    <h1 data-str="deniedTitle"></h1>
    <p data-str="deniedBody"></p>
    <button id="btn-retry" data-str="retryButton"></button>
  </section>

  <!-- ============ STATE: unsupported ============ -->
  <section id="state-unsupported" hidden>
    <h1 data-str="unsupportedTitle"></h1>
    <p data-str="unsupportedBody"></p>
  </section>

  <!-- ============ AR VIEW (scanning + experience) ============ -->
  <div id="ar-container" hidden>
    <a-scene id="ar-scene"
      mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Everything inside this entity is glued to the mat.
           Mat coordinate system: mat width = 1 unit, origin at mat center. -->
      <a-entity id="mat-anchor" mindar-image-target="targetIndex: 0">
        <!-- Phase 1 proof: a red cube standing on the center circle -->
        <a-box color="#d34a3e" position="0 0 0.09"
               scale="0.18 0.18 0.18" rotation="0 0 20"></a-box>
      </a-entity>
    </a-scene>

    <!-- overlay: shown while searching for the mat -->
    <div id="overlay-scanning" class="overlay-card">
      <img src="assets/mat_thumb.png" alt="" />
      <p data-str="scanningHint"></p>
    </div>

    <!-- overlay: shown while the mat is tracked (Phase 1 only) -->
    <div id="overlay-found" class="overlay-badge" hidden>
      <span data-str="trackingOk"></span>
    </div>

    <button id="btn-exit" data-str="exitButton" aria-label="Exit"></button>
  </div>

  <script src="js/strings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
