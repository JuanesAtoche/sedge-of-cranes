<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sedge of Cranes</title>
  <link rel="stylesheet" href="css/style.css?v=0.4.0" />
  <!--
    NOTE (Phase 4): the AR libraries (A-Frame 1.5.0 + MindAR 1.2.5, ~1.5 MB)
    are now LAZY-LOADED by js/app.js when the user taps Start. The landing
    page itself is ~50 KB, which keeps cold start fast on 4G (spec §8).
    Pinned CDN URLs live at the top of js/app.js.
  -->
</head>
<body>

  <!-- ============ STATE 1: landing ============ -->
  <section id="state-landing">
    <svg class="crane-emblem" viewBox="0 0 120 100" role="img" aria-label="Origami crane">
      <polygon points="10,62 48,50 44,78" fill="#d9534a"/>
      <polygon points="44,78 48,50 78,58 62,84" fill="#b8433c"/>
      <polygon points="48,50 58,12 78,58" fill="#e8776f"/>
      <polygon points="78,58 96,44 104,30 98,44" fill="#d9534a"/>
      <polygon points="104,30 112,26 104,36" fill="#24435c"/>
    </svg>
    <h1 data-str="appTitle"></h1>
    <p data-str="tagline"></p>
    <p class="warn" id="inapp-warning" hidden data-str="inAppWarning"></p>
    <button id="btn-start" data-str="startButton"></button>
    <p class="explainer" data-str="cameraExplainer"></p>
    <p><a href="assets/mat.pdf" target="_blank" data-str="matLinkLabel"></a></p>
    <p class="version" id="version-stamp"></p>
  </section>

  <!-- ============ STATE 2: permission denied ============ -->
  <section id="state-denied" hidden>
    <h1 data-str="deniedTitle"></h1>
    <p id="denied-body"></p>
    <button id="btn-retry" data-str="retryButton"></button>
  </section>

  <!-- ============ STATE 5: unsupported / load error (with GIF fallback) ============ -->
  <section id="state-unsupported" hidden>
    <h1 id="unsupported-title"></h1>
    <p id="unsupported-body"></p>
    <p class="explainer" data-str="fallbackCaption"></p>
    <img class="fallback-gif" src="assets/fallback.gif" alt="Animation of seven paper cranes flying over the story mat" loading="lazy" />
  </section>

  <!-- ============ STATES 3 & 4: AR (scanning ⇄ experience) ============ -->
  <div id="ar-container" hidden>
    <!-- The <a-scene> lives in a template: it must not exist in the DOM
         until A-Frame + MindAR are loaded (lazy). app.js injects it. -->
    <template id="ar-scene-template">
      <a-scene id="ar-scene"
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001"
        color-space="sRGB"
        renderer="colorManagement: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity light="type: ambient; intensity: 0.9"></a-entity>
        <a-entity light="type: directional; intensity: 0.7" position="0.5 1 2"></a-entity>
        <a-entity id="mat-anchor" mindar-image-target="targetIndex: 0">
          <!--<a-entity flock></a-entity>-->
          <a-entity id="flock" sedge-flock></a-entity>          
        </a-entity>
      </a-scene>
    </template>

    <div id="overlay-scanning" class="overlay-card">
      <img src="assets/mat_thumb.png" alt="" />
      <p id="scanning-text"></p>
    </div>

    <button id="btn-story" class="story-btn" hidden></button>
    <div id="subtitle-bar" hidden></div>

    <button id="btn-exit" data-str="exitButton" aria-label="Exit"></button>
    <button id="btn-mute" class="chip"></button>
    <button id="btn-subs" class="chip"></button>
  </div>

  <script src="js/strings.js?v=0.5.0"></script>
  <script src="js/app.js?v=0.5.0"></script>
</body>
</html>
